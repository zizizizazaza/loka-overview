<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/loka-logo-symbol.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loka — Multi-Agent Consensus for Investing</title>

    <!-- Tailwind via CDN keeps this export build-free -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>

    <!-- Fonts used by the landing page -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&display=swap"
    />

    <style>
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        font-family: 'Geist', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Used by ConsensusChat / animation reveals */
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
      .animate-fadeIn { animation: fadeIn 0.35s ease-out both; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
